name: "*** build tipa file ***"

on:
  # schedule:
  #   - cron: '0 */2 * * *' # every 2 hours
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        run: |
          set -x
          # Clone upstream recursively to get all submodules populated
          git clone --recursive https://github.com/roothide/Dopamine2-roothide /tmp/upstream
          # Clone our fork which has the modified source files
          git clone https://github.com/${{ github.repository }} /tmp/ourfork
          # Populate workspace from upstream (includes all submodules)
          cp -r /tmp/upstream/. ${{ github.workspace }}/
          # Apply our modifications on top
          cp /tmp/ourfork/BaseBin/systemhook/src/roothider_common.c ${{ github.workspace }}/BaseBin/systemhook/src/roothider_common.c
          cp /tmp/ourfork/BaseBin/systemhook/src/roothider_main.c ${{ github.workspace }}/BaseBin/systemhook/src/roothider_main.c
          cp /tmp/ourfork/BaseBin/jailbreakd/src/main.m ${{ github.workspace }}/BaseBin/jailbreakd/src/main.m
          cp /tmp/ourfork/Application/Dopamine/UI/Settings/DOSettingsController.m ${{ github.workspace }}/Application/Dopamine/UI/Settings/DOSettingsController.m
          
      - name: Install Procursus
        uses: dhinakg/procursus-action@main
        with:
          packages: ldid findutils sed coreutils make

      - name: Install THEOS
        run: |
          set -x
          export BASEDIR="$(pwd)"
          export THEOS="${BASEDIR}/theos"
          mkdir -p $THEOS
          curl -fsSL https://raw.githubusercontent.com/roothide/theos/master/bin/install-theos >> install-theos.sh
          gsed -E "/^\s*get_theos\s*$/,+1 s/^(\s*)(get_sdks)\s*$/\1mkdir -p \${THEOS}\/sdks\n\1touch \${THEOS}\/sdks\/sdk\n\1\2/g" -i install-theos.sh
          bash install-theos.sh
          curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz --output $THEOS/sdks/iPhoneOS16.5.sdk.tar.xz
          gunzip $THEOS/sdks/iPhoneOS16.5.sdk.tar.xz
          tar -xf $THEOS/sdks/iPhoneOS16.5.sdk.tar -C $THEOS/sdks
          rm $THEOS/sdks/iPhoneOS16.5.sdk.tar
          cd $BASEDIR

      - name: Build and Install trustcache
        run: |
          set -x
          git clone https://github.com/CRKatri/trustcache
          cd trustcache
          export CFLAGS="$CFLAGS -I$(brew --prefix openssl)/include -arch arm64"
          export LDFLAGS="$LDFLAGS -L$(brew --prefix openssl)/lib -arch arm64"
          gmake -j$(sysctl -n hw.physicalcpu) OPENSSL=1
          sudo cp trustcache /opt/procursus/bin/

      - name: Set Environment Variables
        run: |
          set -x
          T2=$(TZ=UTC-2 date +'%Y%m%d_%H%M%S')
          TS=$(date -j -f "%Y%m%d_%H%M%S" "${T2}" +%s)
          SHASH=$(git rev-parse --short HEAD)
          echo "ctime=${T2}" >> $GITHUB_ENV
          echo "ctimestamp=${TS}" >> $GITHUB_ENV
          echo "shorthash=${SHASH}" >> $GITHUB_ENV

      - name: Install libarchive
        run: |
          brew install libarchive

      - name: Build
        run: |
          set -x
          export BASEDIR="$(pwd)"
          export THEOS="${BASEDIR}/theos"
          typeset itemcount=$(plutil -extract items raw -expect array ./Application/Dopamine/UI/Settings/Credits.plist)
          for ((i=0; i<$itemcount; i++)); do if [ "$(plutil -extract items.$i.headerCellClass raw ./Application/Dopamine/UI/Settings/Credits.plist)" = "DOCreditsCell" ]; then DOCreditsCellIndex=$i; break; fi; done;
          plutil -insert items.$DOCreditsCellIndex.names -xml "<dict><key>name</key><string>${{ github.actor }}</string><key>link</key><string>https://github.com/${{ github.repository }}</string></dict>" -append ./Application/Dopamine/UI/Settings/Credits.plist
          rm -rf $(xcrun --sdk iphoneos --show-sdk-path)/usr/include/xpc $(xcrun --sdk iphoneos --show-sdk-path)/usr/include/xpc.modulemap
          gmake -j$(sysctl -n hw.physicalcpu)
          VERSION=$(cat ./BaseBin/_external/basebin/.version)-$(git rev-parse --short HEAD)
          mv ./Application/Dopamine.tipa  "./Application/roothide-Dopamine-${VERSION}.tipa"
          echo "version=${VERSION}" >> $GITHUB_ENV

      - name: Upload Artifact
        id: dopamine-latest-upload
        uses: actions/upload-artifact@v4
        with:
          name: roothide-Dopamine-${{ env.version }}.tipa
          path: |
            ${{ github.workspace }}/Application/roothide-Dopamine-${{ env.version }}.tipa

      - name: Publish Latest Release
        run: |
          set -x
          TIPA="./Application/roothide-Dopamine-${{ env.version }}.tipa"
          # Delete previous "latest" release and tag so we can recreate it
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "Latest Build (${{ env.version }})" \
            --notes "Auto-built from commit ${{ github.sha }}. Install via TrollStore — rename to .ipa if needed." \
            --target "${{ github.sha }}" \
            "$TIPA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}