name: "*** build tipa file ***"

on:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Clone upstream
        run: |
          set -x
          git clone --recursive https://github.com/roothide/Dopamine2-roothide /tmp/upstream
          cp -r /tmp/upstream/. ${{ github.workspace }}/

      - name: Inject roothider_common.c
        run: |
          base64 -D << 'B64_RC' | gunzip > ${{ github.workspace }}/BaseBin/systemhook/src/roothider_common.c
          
          B64_RC

      - name: Inject roothider_main.c
        run: |
          base64 -D << 'B64_RM' | gunzip > ${{ github.workspace }}/BaseBin/systemhook/src/roothider_main.c
          
