      - name: Install Procursus
        uses: dhinakg/procursus-action@main
        with:
          packages: ldid findutils sed coreutils make

      - name: Install THEOS
        run: |
          set -x
          export BASEDIR="$(pwd)"
          export THEOS="${BASEDIR}/theos"
          mkdir -p $THEOS
          curl -fsSL https://raw.githubusercontent.com/roothide/theos/master/bin/install-theos >> install-theos.sh
          gsed -E "/^\s*get_theos\s*$/,+1 s/^(\s*)(get_sdks)\s*$/\1mkdir -p \${THEOS}\/sdks\n\1touch \${THEOS}\/sdks\/sdk\n\1\2/g" -i install-theos.sh
          bash install-theos.sh
          curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz --output $THEOS/sdks/iPhoneOS16.5.sdk.tar.xz
          gunzip $THEOS/sdks/iPhoneOS16.5.sdk.tar.xz
          tar -xf $THEOS/sdks/iPhoneOS16.5.sdk.tar -C $THEOS/sdks
          rm $THEOS/sdks/iPhoneOS16.5.sdk.tar
          cd $BASEDIR

      - name: Build and Install trustcache
        run: |
          set -x
          git clone https://github.com/CRKatri/trustcache
          cd trustcache
          export CFLAGS="$CFLAGS -I$(brew --prefix openssl)/include -arch arm64"
          export LDFLAGS="$LDFLAGS -L$(brew --prefix openssl)/lib -arch arm64"
          gmake -j$(sysctl -n hw.physicalcpu) OPENSSL=1
          sudo cp trustcache /opt/procursus/bin/

      - name: Set Environment Variables
        run: |
          set -x
          T2=$(TZ=UTC-2 date +'%Y%m%d_%H%M%S')
          TS=$(date -j -f "%Y%m%d_%H%M%S" "${T2}" +%s)
          SHASH=$(git rev-parse --short HEAD)
          echo "ctime=${T2}" >> $GITHUB_ENV
          echo "ctimestamp=${TS}" >> $GITHUB_ENV
          echo "shorthash=${SHASH}" >> $GITHUB_ENV

      - name: Install libarchive
        run: |
          brew install libarchive

      - name: Build
        run: |
          set -x
          export BASEDIR="$(pwd)"
          export THEOS="${BASEDIR}/theos"
          rm -rf $(xcrun --sdk iphoneos --show-sdk-path)/usr/include/xpc $(xcrun --sdk iphoneos --show-sdk-path)/usr/include/xpc.modulemap
          gmake -j$(sysctl -n hw.physicalcpu)
          VERSION=$(cat ./BaseBin/_external/basebin/.version)-$(git rev-parse --short HEAD)
          mv ./Application/Dopamine.tipa "./Application/roothide-Dopamine-${VERSION}.tipa"
          echo "version=${VERSION}" >> $GITHUB_ENV

      - name: Upload Artifact
        id: dopamine-latest-upload
        uses: actions/upload-artifact@v4
        with:
          name: roothide-Dopamine-${{ env.version }}.tipa
          path: |
            ${{ github.workspace }}/Application/roothide-Dopamine-${{ env.version }}.tipa

      - name: Publish Latest Release
        run: |
          set -x
          TIPA="./Application/roothide-Dopamine-${{ env.version }}.tipa"
          gh release delete latest --yes --cleanup-tag --repo "${{ github.repository }}" 2>/dev/null || true
          cat > /tmp/rn.md << 'ENDNOTES'
          ## Install
          Install via **TrollStore** - rename .tipa to .ipa if needed.

          ## Supported iOS
          - iOS 15.0 - 15.8.x
          - iOS 16.0 - 16.7.16

          ## What changed

          Advanced jailbreak detection bypass — keeps the jailbreak undetectable to banking and financial apps. Revolut, Curve, and similar apps confirmed working.

          Fully persistent across device usage. Stays active regardless of what apps are installed or changed after jailbreaking.

          Includes a built-in diagnostic log viewer under Dopamine Settings for advanced users.

          Based on Dopamine2-roothide 2.4.9 by roothide.
          ENDNOTES
          gh release create latest \
            --repo "${{ github.repository }}" \
            --title "Revohide Dopamine 2.4.9 - iOS 15.x / 16.7.16" \
            --notes-file /tmp/rn.md \
            --target "${{ github.sha }}" \
            "$TIPA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
